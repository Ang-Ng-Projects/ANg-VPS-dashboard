<div class="row mt-3 pb-2">
    <div class="col-6">
        <p class="font-blk mar-10"> Appointment Analytics </p>
    </div>
    <div class="p-field col-4">
        <p-calendar
          #calendar
          view="month"
          showClear="true"
          [hideOnDateTimeSelect]="true"
          selectionMode="range"
          [(ngModel)]="fromDate"
          dateFormat="mm/yy"
          [yearNavigator]="true" yearRange="2000:2030"
          [readonlyInput]="true"
          inputId="pickmonth"
          
          [showTransitionOptions]="'1ms'" [hideTransitionOptions]="'1ms'"
          [showIcon]="true"
          placeholder="Select Month/Year Range">
          <p-footer>
            <button pButton type="button" label="Close" 
               (click)="calendar.hideOverlay()">
            </button>
        </p-footer>
        </p-calendar>
        
    </div>
  
  
   
    
    <div class="col-1 pt-1 text-right pr-0">
        
        <button  class="btn btn-pri btn-pri-shadow" (click)="apply()">
            Apply
        </button>
        
    </div>
    <div class="col-1 pt-1">
        <button  class="btn btn-sec btn-sec-shadow" (click)="clearDate()">
            Clear
        </button>
    </div>
</div>

<div class="pt-2 pr-2 box shadow">
    <div id="chart2" >
        <apx-chart
          [series]="chartOptions.series"
          [chart]="chartOptions.chart"
          [dataLabels]="chartOptions.dataLabels"
          [plotOptions]="chartOptions.plotOptions"
          [yaxis]="chartOptions.yaxis"
          [xaxis]="chartOptions.xaxis"
          [fill]="chartOptions.fill"
          [title]="chartOptions.title"
          [colors]="chartOptions.colors"
          [labels]="chartOptions.labels"
        ></apx-chart>
        <div class="text-center flex-container">
            <div class="dot pr-4"></div>
            <div class=" pl-2"> Highest Appointment Count</div>
            <div class="dot2 pr-4"></div>
            <div class="pl-2"> Lowest Appointment Count</div>
        </div>
        
      </div>
</div>
